# ── Prefix ────────────────────────────────────
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# ── Mouse & base index ────────────────────────
setw -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ── Vi mode ───────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# ── Splits (open in current path) ─────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (vim-tmux-navigator aware) ─
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing ─────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ─────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message " Config reloaded!"

# ── Performance ───────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 0          # eliminate vim lag
set -g history-limit 50000
set -g focus-events on

# ── Plugins ───────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'      # save/restore sessions  (prefix + Ctrl-s / Ctrl-r)
set -g @plugin 'tmux-plugins/tmux-continuum'      # auto-save every 10 min
set -g @plugin 'christoomey/vim-tmux-navigator'   # seamless vim ↔ tmux pane navigation
set -g @plugin 'omerxx/tmux-sessionx'             # fzf session manager  (prefix + o)

# ── Plugin settings ───────────────────────────
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_tabs_enabled on

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

set -g @sessionx-bind 'o'

# ── Status bar ────────────────────────────────
set -g status-right '#{prefix_highlight} | %a %Y-%m-%d %H:%M'

# Initialize TMUX plugin manager (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'

