# ── Prefix ────────────────────────────────────
set -g prefix C-b
unbind-key C-a
bind-key C-b send-prefix

# ── Mouse & base index ────────────────────────
setw -g mouse on
set -g base-index 0
set -g pane-base-index 0
set-window-option -g pane-base-index 0
set-option -g renumber-windows on

# ── Vi mode ───────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# ── Splits (open in current path) ─────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (vim-tmux-navigator aware) ─
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing ─────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ─────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message " Config reloaded!"

# ── Lazygit popup ─────────────────────────────
bind g display-popup -e TERM=xterm-256color -w 100% -h 100% -d "#{pane_current_path}" lazygit

# ── Performance ───────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 0          # eliminate vim lag
set -g history-limit 500000
set -g focus-events on
set -s set-clipboard on

# ── Plugins ───────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.3.0'          # catppuccin mocha theme (v2)
set -g @plugin 'tmux-plugins/tmux-cpu'            # cpu/ram status modules
set -g @plugin 'tmux-plugins/tmux-battery'        # battery status module
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'      # save/restore sessions  (prefix + Ctrl-s / Ctrl-r)
set -g @plugin 'tmux-plugins/tmux-continuum'      # auto-save every 10 min
set -g @plugin 'christoomey/vim-tmux-navigator'   # seamless vim ↔ tmux pane navigation
set -g @plugin 'omerxx/tmux-sessionx'             # fzf session manager  (prefix + o)
# set -g @plugin 'fcsonline/tmux-thumbs'          # hint-mode copy (disabled)
set -g @plugin 'wfxr/tmux-fzf-url'               # open URLs from output  (prefix + u)

# ── Catppuccin theme (must be configured before run) ──
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_current_number_color "#{@thm_peach}"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Load catppuccin now so its color variables are available for status-right below.
# TPM still re-runs it at the bottom — that's fine (idempotent).
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# ── Status bar ────────────────────────────────
set -g status-position top
set -g status-left-length 100
set -g status-right-length 200
set -g status-left  "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag  status-right "#{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text "%a %Y-%m-%d %H:%M"

# ── Plugin settings ───────────────────────────
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# resurrect: also save pane contents + restore nvim sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

set -g @sessionx-bind 'o'

# Initialize TMUX plugin manager (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'

