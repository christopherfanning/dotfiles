# Catppuccin Mocha theme for Yazi

[manager]
cwd = { fg = "#89b4fa" }

# Hovered
hovered         = { fg = "#1e1e2e", bg = "#89b4fa" }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#f9e2af", italic = true }
find_position = { fg = "#f38ba8", bg = "reset", italic = true }

# Marker
marker_copied   = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_cut      = { fg = "#f38ba8", bg = "#f38ba8" }
marker_marked   = { fg = "#cba6f7", bg = "#cba6f7" }
marker_selected = { fg = "#89b4fa", bg = "#89b4fa" }

# Tab
tab_active   = { fg = "#1e1e2e", bg = "#cba6f7" }
tab_inactive = { fg = "#cdd6f4", bg = "#313244" }
tab_width    = 1

# Count
count_copied   = { fg = "#1e1e2e", bg = "#a6e3a1" }
count_cut      = { fg = "#1e1e2e", bg = "#f38ba8" }
count_selected = { fg = "#1e1e2e", bg = "#89b4fa" }

# Border
border_symbol = "│"
border_style  = { fg = "#585b70" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#313244", bg = "#313244" }

# Mode
mode_normal = { fg = "#1e1e2e", bg = "#89b4fa", bold = true }
mode_select = { fg = "#1e1e2e", bg = "#a6e3a1", bold = true }
mode_unset  = { fg = "#1e1e2e", bg = "#f2cdcd", bold = true }

# Progress
progress_label  = { fg = "#cdd6f4", bold = true }
progress_normal = { fg = "#89b4fa", bg = "#313244" }
progress_error  = { fg = "#f38ba8", bg = "#313244" }

# Permissions
perm_type  = { fg = "#89b4fa" }
perm_read  = { fg = "#f9e2af" }
perm_write = { fg = "#f38ba8" }
perm_exec  = { fg = "#a6e3a1" }
perm_sep   = { fg = "#585b70" }

[input]
border   = { fg = "#89b4fa" }
title    = { fg = "#89b4fa" }
value    = { fg = "#cdd6f4" }
selected = { reversed = true }

[completion]
border   = { fg = "#89b4fa" }
active   = { bg = "#313244" }
inactive = {}

[tasks]
border  = { fg = "#89b4fa" }
title   = {}
hovered = { underline = true }

[which]
mask            = { bg = "#1e1e2e" }
cand            = { fg = "#89dceb" }
rest            = { fg = "#6c7086" }
desc            = { fg = "#cba6f7" }
separator       = "  "
separator_style = { fg = "#585b70" }

[help]
on      = { fg = "#cba6f7" }
exec    = { fg = "#89dceb" }
desc    = { fg = "#6c7086" }
hovered = { bg = "#313244", bold = true }
footer  = { fg = "#1e1e2e", bg = "#89b4fa" }

[filetype]
rules = [
  # Images
  { mime = "image/*", fg = "#89dceb" },
  # Videos
  { mime = "video/*", fg = "#f9e2af" },
  # Audio
  { mime = "audio/*", fg = "#f38ba8" },
  # Archives
  { mime = "application/zip",              fg = "#cba6f7" },
  { mime = "application/gzip",             fg = "#cba6f7" },
  { mime = "application/x-tar",            fg = "#cba6f7" },
  { mime = "application/x-bzip2",          fg = "#cba6f7" },
  { mime = "application/x-7z-compressed",  fg = "#cba6f7" },
  { mime = "application/x-rar",            fg = "#cba6f7" },
  # Docs
  { mime = "application/pdf",              fg = "#f38ba8" },
  { mime = "text/*",                       fg = "#a6e3a1" },
  # Fallback
  { name = "*",  fg = "#cdd6f4" },
  { name = "*/", fg = "#89b4fa" },
]
