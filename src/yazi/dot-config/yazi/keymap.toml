# Yazi keymap — vim-style navigation is the default.
# This file adds a few extra convenience bindings on top.

[manager]
keymap = [
  # ── Hints ─────────────────────────────────────
  { on = ["g", "h"], run = "cd ~",              desc = "Go to home directory" },
  { on = ["g", "c"], run = "cd ~/.config",      desc = "Go to ~/.config" },
  { on = ["g", "d"], run = "cd ~/dotfiles",     desc = "Go to dotfiles" },
  { on = ["g", "C"], run = "cd ~/code",         desc = "Go to ~/code" },

  # ── Bulk rename ───────────────────────────────
  { on = "R", run = "bulk-rename", desc = "Bulk rename with $EDITOR" },

  # ── Open with Neovim directly ─────────────────
  { on = "e", run = "open --with edit", desc = "Open with Neovim" },
]
