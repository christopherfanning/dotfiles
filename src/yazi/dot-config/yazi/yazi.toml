[manager]
ratio          = [1, 2, 4]
sort_by        = "alphabetical"
sort_sensitive = true
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true

[preview]
tab_size   = 2
max_width  = 600
max_height = 900
wrap       = "no"

[opener]
edit = [
  { run = 'nvim "$@"', desc = "Edit in Neovim", block = true },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open", orphan = true },
]
reveal = [
  { run = 'xdg-open "$(dirname "$@")"', desc = "Reveal in file manager", orphan = true },
]

[open]
rules = [
  { mime = "text/*",             use = ["edit", "open"] },
  { mime = "application/json",   use = ["edit", "open"] },
  { mime = "*/xml",              use = ["edit", "open"] },
  { mime = "image/*",            use = ["open"] },
  { mime = "video/*",            use = ["open"] },
  { mime = "audio/*",            use = ["open"] },
  { mime = "application/pdf",    use = ["open"] },
  { mime = "*",                  use = ["open"] },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912  # 512 MB
image_bound      = [0, 0]
suppress_preload = false

[log]
enabled = false
