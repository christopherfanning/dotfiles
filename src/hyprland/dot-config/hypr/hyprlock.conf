background {
    monitor =
    color = rgba(1e1e2eff)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    outer_color    = rgb(b4befe)    # lavender
    inner_color    = rgb(313244)    # surface0
    font_color     = rgb(cdd6f4)    # text
    fade_on_empty  = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color  = rgb(a6e3a1)      # green
    fail_color   = rgb(f38ba8)      # red
    fail_text    = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text     = cmd[update:1000] echo "<b>$(date +'%H:%M')</b>"
    color    = rgba(cdd6f4ff)
    font_size = 72
    font_family = MesloLGS NF
    position = 0, 200
    halign   = center
    valign   = center
}

label {
    monitor =
    text     = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color    = rgba(bac2deff)
    font_size = 18
    font_family = MesloLGS NF
    position = 0, 120
    halign   = center
    valign   = center
}
