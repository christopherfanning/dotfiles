####################################################################
# Hyprland config — catppuccin mocha, vim navigation
# https://wiki.hyprland.org/Configuring/
####################################################################

# ── Monitors ───────────────────────────────────────────────────────
# Auto-detect all monitors at native resolution
monitor = ,preferred,auto,1

# ── Autostart ──────────────────────────────────────────────────────
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = wl-paste --type text --watch cliphist store   # clipboard history
exec-once = wl-paste --type image --watch cliphist store

# ── Wayland / XWayland compatibility ───────────────────────────────
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ── Catppuccin Mocha palette ────────────────────────────────────────
$base     = 0xff1e1e2e
$mantle   = 0xff181825
$surface0 = 0xff313244
$surface1 = 0xff45475a
$text     = 0xffcdd6f4
$lavender = 0xffb4befe
$blue     = 0xff89b4fa
$mauve    = 0xffcba6f7
$pink     = 0xfff5c2e7
$red      = 0xfff38ba8
$green    = 0xffa6e3a1

# ── General ────────────────────────────────────────────────────────
general {
    gaps_in  = 5
    gaps_out = 12
    border_size = 2

    col.active_border   = $lavender $blue 45deg
    col.inactive_border = $surface0

    layout = dwindle
    allow_tearing = false
}

# ── Decorations ────────────────────────────────────────────────────
decoration {
    rounding = 8

    blur {
        enabled  = true
        size     = 8
        passes   = 2
        vibrancy = 0.1696
    }

    drop_shadow   = true
    shadow_range  = 15
    shadow_render_power = 2
    col.shadow    = rgba(1e1e2ecc)
}

# ── Animations ─────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = smooth,   0.05, 0.9, 0.1, 1.05
    bezier = linear,   0.0,  0.0, 1.0, 1.0
    bezier = overshot, 0.13, 0.99, 0.29, 1.1

    animation = windows,     1, 6,  smooth
    animation = windowsOut,  1, 4,  default, popin 80%
    animation = windowsMove, 1, 5,  smooth
    animation = fade,        1, 6,  default
    animation = workspaces,  1, 5,  overshot, slide
    animation = specialWorkspace, 1, 5, smooth, slidevert
}

# ── Layouts ────────────────────────────────────────────────────────
dwindle {
    pseudotile    = true
    preserve_split = true
}

master {
    new_status = master
}

# ── Input ──────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll     = true
        disable_while_typing = true
        tap-to-click       = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

# ── Misc ───────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    animate_mouse_windowdragging = true
}

####################################################################
# Keybindings
####################################################################

$mainMod = SUPER
$term    = ghostty
$menu    = wofi --show drun

# ── Apps ───────────────────────────────────────────────────────────
bind = $mainMod,       Return, exec, $term
bind = $mainMod,       Space,  exec, $menu
bind = $mainMod,       B,      exec, google-chrome-stable
bind = $mainMod,       F,      exec, $term -- yazi        # file manager
bind = $mainMod,       G,      exec, $term -- lazygit
bind = $mainMod SHIFT, D,      exec, $term -- lazydocker
bind = $mainMod,       period, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ── Window management ──────────────────────────────────────────────
bind = $mainMod SHIFT, Q,      killactive
bind = $mainMod,       M,      exit
bind = $mainMod,       V,      togglefloating
bind = $mainMod,       P,      pseudo         # dwindle
bind = $mainMod,       T,      togglesplit    # dwindle
bind = $mainMod,       Z,      fullscreen, 0

# ── Focus — vim-style (hjkl) ───────────────────────────────────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ── Move windows — vim-style ───────────────────────────────────────
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# ── Resize — arrow keys ────────────────────────────────────────────
binde = $mainMod CTRL, H, resizeactive, -40 0
binde = $mainMod CTRL, L, resizeactive,  40 0
binde = $mainMod CTRL, K, resizeactive,  0 -40
binde = $mainMod CTRL, J, resizeactive,  0  40

# ── Workspaces 1–9 ─────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Scroll through workspaces ──────────────────────────────────────
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

# ── Scratchpad ─────────────────────────────────────────────────────
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ── Media / brightness ─────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl prev

# ── Screenshots (grim + slurp) ─────────────────────────────────────
bind = , Print,             exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = SHIFT, Print,        exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = CTRL,  Print,        exec, grim -g "$(slurp)" - | wl-copy

# ── Screen lock ────────────────────────────────────────────────────
bind = $mainMod SHIFT, X, exec, hyprlock

####################################################################
# Window rules
####################################################################

windowrulev2 = suppressevent maximize, class:.*   # don't honour maximize requests
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin,   title:^(Picture-in-Picture)$
